<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Catálogo de vehículos | Trust Motors</title>
  <meta name="description" content="Explora todos los vehículos disponibles en Trust Motors. Filtra por marca, tipo, precio y más.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3">
  <link rel="stylesheet" href="autos.css?v=3">
</head>
<body class="catalog-page">

  <header class="header scrolled" id="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="logo-trust">TRUST</span>
        <span class="logo-motors">MOTORS</span>
      </a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="autos.html" class="nav-link active">Vehículos</a>
        <a href="index.html#servicios" class="nav-link">Servicios</a>
        <a href="index.html#contacto" class="nav-link">Contacto</a>
      </nav>
      <div class="header-actions">
        <a href="https://api.whatsapp.com/send?phone=56948406684" class="btn btn-whatsapp" target="_blank" rel="noopener" aria-label="WhatsApp">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

        </a>
        <button class="hamburger" id="hamburger" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="catalog-main">
    <div class="catalog-topbar">
      <div class="container catalog-topbar-inner">
        <div>
          <a href="index.html" class="catalog-back">← Inicio</a>
          <h1 class="catalog-title">Vehículos publicados</h1>
          <p class="catalog-subtitle">Encuentra tu próximo auto en Trust Motors</p>
        </div>
        <button type="button" class="btn btn-outline catalog-filters-toggle" id="btnToggleFilters" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M8 12h8M10 18h4"/></svg>
          Filtros
        </button>
      </div>
    </div>

    <div class="container catalog-layout">
      <aside class="catalog-filters" id="catalogFilters">
        <div class="catalog-filters-head">
          <h2>Buscar auto</h2>
          <button type="button" class="catalog-filters-close" id="btnCloseFilters" aria-label="Cerrar filtros">&times;</button>
        </div>

        <div class="filter-block">
          <label class="filter-label">Tipo de vehículo</label>
          <div class="type-chips" id="typeChips">
            <button type="button" class="type-chip active" data-type="">Todos</button>
            <button type="button" class="type-chip" data-type="SUV">SUV</button>
            <button type="button" class="type-chip" data-type="Sedán">Sedán</button>
            <button type="button" class="type-chip" data-type="Hatchback">Hatchback</button>
            <button type="button" class="type-chip" data-type="Pickup">Pickup</button>
          </div>
        </div>

        <div class="filter-grid">
          <div class="filter-field">
            <label for="catBrand">Marca</label>
            <select id="catBrand"><option value="">Todas</option></select>
          </div>
          <div class="filter-field">
            <label for="catModel">Modelo</label>
            <select id="catModel"><option value="">Todos</option></select>
          </div>
          <div class="filter-field">
            <label for="catYear">Año desde</label>
            <select id="catYear">
              <option value="">Cualquiera</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2020">2020</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="catPriceMax">Precio hasta</label>
            <select id="catPriceMax">
              <option value="">Sin límite</option>
              <option value="10000000">$10.000.000</option>
              <option value="15000000">$15.000.000</option>
              <option value="20000000">$20.000.000</option>
              <option value="30000000">$30.000.000</option>
              <option value="50000000">$50.000.000</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="catFuel">Combustible</label>
            <select id="catFuel">
              <option value="">Todos</option>
              <option value="Bencina">Bencina</option>
              <option value="Diésel">Diésel</option>
              <option value="Híbrido">Híbrido</option>
              <option value="Eléctrico">Eléctrico</option>
            </select>
          </div>
          <div class="filter-field">
            <label for="catTransmission">Transmisión</label>
            <select id="catTransmission">
              <option value="">Todas</option>
              <option value="Automática">Automática</option>
              <option value="Manual">Manual</option>
              <option value="CVT">CVT</option>
            </select>
          </div>
        </div>

        <label class="filter-check">
          <input type="checkbox" id="catFinanceOnly">
          <span>Solo financiables</span>
        </label>

        <div class="filter-actions">
          <button type="button" class="btn btn-primary" id="btnApplyFilters">Aplicar</button>
          <button type="button" class="btn btn-outline" id="btnClearCatalogFilters">Limpiar filtros</button>
        </div>
      </aside>

      <div class="catalog-results">
        <div class="catalog-toolbar">
          <p class="catalog-count" id="catalogCount">Cargando vehículos…</p>
          <div class="catalog-sort">
            <label for="catSort">Ordenar</label>
            <select id="catSort">
              <option value="featured">Destacados primero</option>
              <option value="price-asc">Menor precio</option>
              <option value="price-desc">Mayor precio</option>
              <option value="year-desc">Más nuevos</option>
              <option value="km-asc">Menor kilometraje</option>
            </select>
          </div>
        </div>

        <div class="catalog-loading" id="catalogLoading">
          <div class="catalog-spinner"></div>
          <p>Cargando publicaciones…</p>
        </div>

        <div class="catalog-grid" id="catalogGrid"></div>

        <div class="catalog-empty" id="catalogEmpty" hidden>
          <p>No hay vehículos con estos filtros.</p>
          <button type="button" class="btn btn-outline" id="btnEmptyClear">Limpiar filtros</button>
        </div>

        <div class="catalog-more-wrap" id="catalogMoreWrap" hidden>
          <button type="button" class="btn btn-outline" id="btnCatalogMore">Cargar más</button>
        </div>
      </div>
    </div>
  </main>

  <a href="https://api.whatsapp.com/send?phone=56948406684&text=Hola%2C%20no%20encuentro%20el%20auto%20que%20busco%20en%20Trust%20Motors" class="catalog-wa-fab" target="_blank" rel="noopener">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <span>¿No encuentras tu auto? Te ayudamos</span>
  </a>

  <div class="catalog-filters-backdrop" id="filtersBackdrop" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="finance-utils.js?v=1"></script>
  <script src="autos.js?v=2"></script>
</body>
</html>
